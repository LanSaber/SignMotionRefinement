experiment_name: guava_mask_aware_meta_c2_fk_jerk_guava_self_finetune
seed: 20260715
device: auto

data:
  completion_root: /media/cvpr/haomian/data/SOKE_FLOW/how2sign_soke_upper_smplx_GUAVA/guava_completed_flow
  reference_root: /media/cvpr/haomian/data/SOKE/How2Sign
  source_split: train
  pilot_fits_dir: ${PROJECT_ROOT}/artifacts/visualizations/guava_bounded_meta_pilot/fits
  cache_dir: /media/cvpr/haomian/data/SOKE_FLOW/how2sign_soke_upper_smplx_GUAVA/guava_mask_aware_meta_cache_c2_v1
  blank_text_cache: ${PROJECT_ROOT}/assets/blank_text_tokens.npz
  validation_group_fraction: 0.20
  max_gap_condition: 256
  gap_envelope_power: 3.0
  in_memory: true

# Start from the accepted C2/FK-temporal model. This experiment has its own
# output directory and never overwrites the parent checkpoint.
parent_checkpoint: ${PROJECT_ROOT}/artifacts/experiments/guava_mask_aware_meta_c2_fk_jerk_finetune/checkpoints/best.pt

text:
  model_path: ${SMR_FLAN_T5_DIR:-/media/cvpr/haomian/SOKE/deps/flan-t5-base}
  device: cpu
  max_tokens: 16
  local_files_only: true
  cache: true

model:
  type: meta_implicit_residual_field
  code_dim: 128
  context_hidden_dim: 256
  hidden_dim: 256
  depth: 4
  time_fourier_bands: 10
  omega0_first: 20.0
  omega0_hidden: 1.0
  residual_scale_init: 0.1
  residual_scale_learnable: true
  dropout: 0.0
  condition_dim: 4

bounds:
  percentile: 90.0
  body_max_degrees: 30.0
  hands_max_degrees: 45.0
  jaw_max_degrees: 8.0
  expression_max: 1.0

# Real tracker-discarded gaps retain the existing dense-SOKE pseudo-target and
# reference-free FK temporal objective.
loss:
  hand_weight: 2.0
  lambda_rot6d: 1.0
  lambda_geodesic: 0.10
  lambda_expression: 0.25
  lambda_fk_mpjpe: 10.0
  lambda_velocity: 0.05
  lambda_acceleration: 0.01
  lambda_correction: 0.02
  lambda_fk_velocity: 0.02
  lambda_fk_acceleration: 0.01
  lambda_fk_jerk_reg: 0.20
  lambda_fk_boundary_velocity: 0.10
  lambda_fk_boundary_acceleration: 0.05
  fk_temporal_hand_weight: 2.0
  fk_velocity_scale_mps: 1.0
  fk_acceleration_scale_mps2: 25.0
  fk_jerk_scale_mps3: 1000.0
  fk_jerk_deadzone_mps3: 100.0
  fk_temporal_charbonnier_epsilon: 0.001

# Domain-matched auxiliary task: hide short spans of retained GUAVA poses,
# rebuild their scaffold with joint-wise SO(3) SLERP, and reconstruct the exact
# poses that were hidden. Derivative matching is intentionally omitted so the
# tracker jitter is not used as a velocity/acceleration/jerk target.
self_supervision:
  enabled: true
  validate: true
  # Pilot weight 0.50 improved held-out GUAVA completion but exceeded the
  # real-gap MPJPE guardrail; 0.10 keeps this task auxiliary.
  weight: 0.10
  seed_offset: 7001
  validation_step: 0
  spans_per_sequence: 2
  min_gap_frames: 1
  max_gap_frames: 8
  max_mask_fraction: 0.20
  loss:
    hand_weight: 2.0
    lambda_rot6d: 1.0
    lambda_geodesic: 0.10
    lambda_expression: 0.25
    lambda_fk_mpjpe: 10.0
    lambda_correction: 0.02

train:
  epochs: 8
  batch_size: 2
  num_workers: 0
  lr: 0.000005
  weight_decay: 0.0001
  grad_clip: 1.0
  freeze_text_projection: true
  early_stop_patience: 5
  max_train_batches: 0

eval:
  alpha_grid: [0.0, 0.25, 0.5, 0.75, 1.0]
  fk_batch_size: 128
  selection_mode: constrained_jerk
  mpjpe_tolerance_from_best_percent: 10.0
  min_mpjpe_improvement_vs_slerp_percent: 5.0
  max_selected_mpjpe_m: 0.072

metrics:
  model_dir: ${SMR_SMPLX_MODEL_DIR:-/media/cvpr/haomian/SOKE/deps/smpl_models}
  gender: NEUTRAL
  betas_mode: h2s_fixed

output:
  out_dir: ${PROJECT_ROOT}/artifacts/experiments/guava_mask_aware_meta_c2_fk_jerk_guava_self_finetune
