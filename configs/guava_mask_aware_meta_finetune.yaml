experiment_name: guava_mask_aware_meta_finetune
seed: 20260715
device: auto

data:
  completion_root: /media/cvpr/haomian/data/SOKE_FLOW/how2sign_soke_upper_smplx_GUAVA/guava_completed_flow
  reference_root: /media/cvpr/haomian/data/SOKE/How2Sign
  source_split: train
  pilot_fits_dir: ${PROJECT_ROOT}/artifacts/visualizations/guava_bounded_meta_pilot/fits
  cache_dir: /media/cvpr/haomian/data/SOKE_FLOW/how2sign_soke_upper_smplx_GUAVA/guava_mask_aware_meta_cache_v1
  blank_text_cache: ${PROJECT_ROOT}/assets/blank_text_tokens.npz
  validation_group_fraction: 0.20
  max_gap_condition: 256
  in_memory: true

parent_checkpoint: ${PROJECT_ROOT}/artifacts/experiments/smpl_samples_meta_implicit_soft_recon_stride8_fk_smooth/checkpoints/best.pt

text:
  model_path: ${SMR_FLAN_T5_DIR:-/media/cvpr/haomian/SOKE/deps/flan-t5-base}
  device: cpu
  max_tokens: 16
  local_files_only: true
  cache: true

model:
  type: meta_implicit_residual_field
  code_dim: 128
  context_hidden_dim: 256
  hidden_dim: 256
  depth: 4
  time_fourier_bands: 10
  omega0_first: 20.0
  omega0_hidden: 1.0
  residual_scale_init: 0.1
  residual_scale_learnable: true
  dropout: 0.0
  condition_dim: 4

bounds:
  percentile: 90.0
  body_max_degrees: 30.0
  hands_max_degrees: 45.0
  jaw_max_degrees: 8.0
  expression_max: 1.0

loss:
  hand_weight: 2.0
  lambda_rot6d: 1.0
  lambda_geodesic: 0.10
  lambda_expression: 0.25
  lambda_fk_mpjpe: 10.0
  lambda_velocity: 0.10
  lambda_acceleration: 0.02
  lambda_correction: 0.02

train:
  epochs: 20
  batch_size: 2
  num_workers: 0
  lr: 0.00002
  weight_decay: 0.0001
  grad_clip: 1.0
  freeze_text_projection: true
  early_stop_patience: 8
  max_train_batches: 0

eval:
  alpha_grid: [0.0, 0.25, 0.5, 0.75, 1.0]
  fk_batch_size: 128

metrics:
  model_dir: ${SMR_SMPLX_MODEL_DIR:-/media/cvpr/haomian/SOKE/deps/smpl_models}
  gender: NEUTRAL
  betas_mode: h2s_fixed

output:
  out_dir: ${PROJECT_ROOT}/artifacts/experiments/guava_mask_aware_meta_finetune
